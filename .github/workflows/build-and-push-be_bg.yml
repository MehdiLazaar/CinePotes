name: Build and Push Docker Image

on:
  workflow_run:
    workflows: ["Conventional Commits"]
    types: [completed]


jobs:
  build-and-push:


      
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write 

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Get the short commit hash
    - name: Get short commit hash
      id: vars
      run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    # Log in to GitHub Docker Registry
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Build the Docker image
    - name: Build Docker image
      run: |
        REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
        REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
        REF_NAME=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')

        IMAGE_TAG="${REF_NAME}"

        docker build ./apps/be-bg \
            --file ./apps/be-bg/Dockerfile \
            --tag ghcr.io/${REPO_OWNER}/${REPO_NAME}:${IMAGE_TAG}

        docker tag ghcr.io/${REPO_OWNER}/${REPO_NAME}:${IMAGE_TAG} \
            ghcr.io/${REPO_OWNER}/${REPO_NAME}:latest

    # Push the Docker image to GitHub Container Registry
    - name: Push Docker image
      run: |
        # Lowercase repository owner and name
        REPO_OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
        REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
        REF_NAME=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')

        IMAGE_TAG="${REF_NAME}"

        docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}:${IMAGE_TAG}
        docker push ghcr.io/${REPO_OWNER}/${REPO_NAME}:latest
